<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Dog Vision</title>
	<link rel="stylesheet" href="../../styles.css">
</head>
<body>
	<a href="../../index.html" class="back">← Back</a>

	<header>
		<h1>Dogs / Cats Vision</h1>
	</header>

	<div id="dropZone">
		Drop image here or click to upload
	</div>
	<input type="file" id="fileInput" accept="image/*">

	<div id="comparison" style="display:none;">
		<div class="slider-container">
			<div class="slider-image human">
				<img id="humanImg" alt="Human view">
				<div class="label">Human</div>
			</div>
			<div class="slider-image dog">
				<canvas id="dogCanvas"></canvas>
				<div class="label">Dog</div>
			</div>
			<input type="range" min="0" max="100" value="50" class="slider" id="slider">
			<div class="slider-handle"></div>
		</div>
	</div>

	<script src="dog.js"></script>
</body>
</html>
